<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>OPM 2025 — Mood & Vibes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    :root {
      --green-glow: rgba(52, 211, 153, 0.25);
      --glass-bg: rgba(15, 15, 20, 0.72);
      --glass-border: rgba(255, 255, 255, 0.08);
      --glass-shine: rgba(255, 255, 255, 0.04);
      --accent: #34d399;
      --accent-dim: #10b981;
    }

    * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }

    html, body {
      overscroll-behavior: none;
    }

    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: #3a50a9;
      min-height: 100dvh;
    }

    /* ── Animated mesh background ── */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 60% 40% at 20% 10%, rgba(52,211,153,0.12) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 80% 80%, rgba(16,185,129,0.09) 0%, transparent 60%),
        radial-gradient(ellipse 40% 30% at 50% 50%, rgba(6,182,212,0.05) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── Noise grain overlay ── */
    body::after {
      content: '';
      position: fixed;
      inset: 0;
      z-index: 0;
      opacity: 0.028;
      pointer-events: none;
      background-image: url("images/musify.png");
      background-repeat: repeat;
      background-size: 128px;
    }

    main, .fixed { z-index: 1; }
    .fixed { z-index: 50 !important; }

    /* ── Glass utility ── */
    .glass {
      background: var(--glass-bg);
      backdrop-filter: blur(20px) saturate(180%);
      -webkit-backdrop-filter: blur(20px) saturate(180%);
      border: 1px solid var(--glass-border);
    }

    .glass-card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(12px) saturate(140%);
      -webkit-backdrop-filter: blur(12px) saturate(140%);
      border: 1px solid rgba(255,255,255,0.07);
      position: relative;
      overflow: hidden;
    }

    /* Inner shine */
    .glass-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
      pointer-events: none;
    }

    /* ── Header ── */
    .header-glass {
      background: rgba(6, 8, 16, 0.78);
      backdrop-filter: blur(24px) saturate(180%);
      -webkit-backdrop-filter: blur(24px) saturate(180%);
      border-bottom: 1px solid rgba(255,255,255,0.07);
      box-shadow: 0 1px 0 rgba(255,255,255,0.04), 0 8px 32px rgba(0,0,0,0.4);
    }

    /* ── Logo ── */
    .logo-mark {
      position: relative;
      width: 38px;
      height: 38px;
      flex-shrink: 0;
    }

    .logo-text {
      font-family: 'Syne', sans-serif;
      font-weight: 800;
      letter-spacing: -0.03em;
      line-height: 1;
    }

    /* ── Quick pick cards ── */
    .quick-pick-card {
      background: rgba(255,255,255,0.04);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 18px;
      transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      position: relative;
      overflow: hidden;
    }

    .quick-pick-card::after {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.10), transparent);
    }

    .quick-pick-card:active {
      transform: scale(0.97);
      background: rgba(52,211,153,0.07);
      border-color: rgba(52,211,153,0.18);
    }

    /* ── Song card ── */
    .song-card {
      transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1);
    }
    .song-card:active { transform: scale(0.95); }

    .album-wrapper {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(0,0,0,0.55), 0 0 0 1px rgba(255,255,255,0.06);
    }

    .album-wrapper::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 16px;
      background: linear-gradient(160deg, rgba(255,255,255,0.06) 0%, transparent 60%);
      pointer-events: none;
    }

    /* ── Progress ── */
    #progressBar { transition: width 0.05s linear; }
    .progress-track {
      background: rgba(255,255,255,0.08);
      border-radius: 999px;
      overflow: hidden;
    }

    /* ── Player glass ── */
    .player-glass {
      background: rgba(6, 8, 16, 0.88);
      backdrop-filter: blur(28px) saturate(200%);
      -webkit-backdrop-filter: blur(28px) saturate(200%);
      border-top: 1px solid rgba(255,255,255,0.09);
      box-shadow: 0 -12px 40px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
    }

    /* ── Play button ── */
    .play-btn {
      background: linear-gradient(135deg, #34d399 0%, #059669 100%);
      box-shadow: 0 0 20px rgba(52,211,153,0.35), 0 4px 12px rgba(0,0,0,0.4);
      transition: all 0.15s ease;
    }
    .play-btn:active {
      transform: scale(0.91);
      box-shadow: 0 0 12px rgba(52,211,153,0.2);
    }

    /* ── Control buttons ── */
    .ctrl-btn {
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.07);
      transition: all 0.15s ease;
    }
    .ctrl-btn:active {
      background: rgba(255,255,255,0.12);
      transform: scale(0.93);
    }

    /* ── Badge ── */
    .badge {
      background: rgba(52,211,153,0.1);
      border: 1px solid rgba(52,211,153,0.22);
      color: #6ee7b7;
    }

    /* ── Section header underline ── */
    .section-title {
      font-family: 'Syne', sans-serif;
      font-weight: 700;
    }

    /* ── Scrollbar ── */
    .overflow-x-auto::-webkit-scrollbar { height: 3px; }
    .overflow-x-auto::-webkit-scrollbar-track { background: transparent; }
    .overflow-x-auto::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 10px; }

    audio { display: none; }

    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* ── Welcome pill ── */
    .welcome-pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: rgba(52,211,153,0.08);
      border: 1px solid rgba(52,211,153,0.16);
      border-radius: 999px;
      padding: 3px 10px;
      font-size: 11px;
      font-weight: 600;
      color: #6ee7b7;
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }

    /* ── Floating dot on cover ── */
    .live-dot {
      width: 10px; height: 10px;
      background: #34d399;
      border-radius: 50%;
      border: 2px solid #060810;
      box-shadow: 0 0 6px rgba(52,211,153,0.7);
    }

    /* ── Safe area bottom ── */
    .safe-bottom { padding-bottom: max(12px, env(safe-area-inset-bottom)); }

    /* ── Entry animation ── */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.5s ease both; }
    .delay-1 { animation-delay: 0.08s; }
    .delay-2 { animation-delay: 0.16s; }
    .delay-3 { animation-delay: 0.24s; }

    /* ── Now playing glow ring ── */
    .cover-ring {
      border-radius: 14px;
      box-shadow: 0 0 0 2px rgba(52,211,153,0.18), 0 6px 18px rgba(0,0,0,0.5);
      transition: box-shadow 0.3s ease;
    }
    .cover-ring.playing {
      box-shadow: 0 0 0 2px rgba(52,211,153,0.5), 0 0 20px rgba(52,211,153,0.2), 0 6px 18px rgba(0,0,0,0.5);
    }
	
	.logo-image{
  width:100%;
  height:100%;
  object-fit:cover;
  border-radius:12px;
  image-rendering:-webkit-optimize-contrast;
  filter:
    drop-shadow(0 0 10px rgba(52,211,153,0.20))
    drop-shadow(0 4px 10px rgba(0,0,0,0.35));
}
  </style>
</head>
<body class="text-white min-h-screen pb-36 selection:bg-emerald-600/30">

  <!-- ═══════════════════════════════════════════
       HEADER with PNG-style Logo
  ══════════════════════════════════════════════ -->
  <header class="fixed top-0 left-0 right-0 z-50 header-glass px-4 py-2.5 flex items-center justify-between" style="padding-top: max(10px, env(safe-area-inset-top))">

    <!-- Logo PNG (inline SVG renders as a crisp PNG-like asset) -->
    <div class="flex items-center gap-2.5">
      <!-- Logo mark -->
      <div class="logo-mark">
        <div class="logo-mark">
  <img
    src="images/musify.png"
    alt="OPM Logo"
    class="logo-image"
  >
</div>
      </div>

      <!-- Logo wordmark -->
      <div class="leading-none">
        <div class="logo-text text-[22px] text-white tracking-tight">MUSIFY<span class="text-emerald-400"></span></div>
        <div class="text-[10px] font-semibold text-emerald-400/70 tracking-[0.18em] uppercase -mt-0.5">Free Music Streaming</div>
      </div>
    </div>

    <!-- Right actions -->
    <div class="flex items-center gap-3">
      <button class="relative w-9 h-9 rounded-full glass-card flex items-center justify-center text-zinc-300">
        <i class="fas fa-bell text-sm"></i>
        <span class="absolute top-1.5 right-1.5 w-2 h-2 bg-emerald-400 rounded-full border border-[#060810]"></span>
      </button>
      <button class="w-9 h-9 rounded-full overflow-hidden glass-card flex items-center justify-center">
        <i class="fas fa-user text-sm text-emerald-400/80"></i>
      </button>
    </div>
  </header>

  <!-- ═══════════════════════════════════════════
       MAIN CONTENT
  ══════════════════════════════════════════════ -->
  <main class="relative pt-[72px] px-4 pb-4">

    <!-- Welcome hero -->
    <div class="mt-4 mb-7 fade-up">
      <div class="welcome-pill mb-2.5">
        <i class="fas fa-seedling text-[9px]"></i> Welcome back
      </div>
      <div class="flex items-end justify-between">
        <div>

          <p class="text-zinc-500 text-sm mt-1 font-medium">Ready to feel every beat?</p>
        </div>
        <div class="badge rounded-2xl px-3 py-2 text-center">
          <div class="text-lg font-bold leading-none text-emerald-300">46</div>
          <div class="text-[10px] font-semibold tracking-widest uppercase opacity-70 mt-0.5">Hits</div>
        </div>
      </div>
    </div>

    <!-- ── Quick Picks ── -->
    <div class="mb-8 fade-up delay-1">
      <div class="flex justify-between items-center mb-3.5">
        <h3 class="section-title text-lg flex items-center gap-2">
          <span class="w-5 h-5 rounded-md bg-emerald-500/20 flex items-center justify-center">
            <i class="fas fa-bolt text-emerald-400 text-[10px]"></i>
          </span>
          Quick Picks
        </h3>

      </div>
      <div class="grid grid-cols-2 gap-2.5" id="quickPicks"></div>
    </div>

    <!-- ── All Songs ── -->
    <div class="fade-up delay-2">
      <div class="flex justify-between items-center mb-4">
        <h3 class="section-title text-lg flex items-center gap-2">
          <span class="w-5 h-5 rounded-md bg-emerald-500/20 flex items-center justify-center">
            <i class="fas fa-music text-emerald-400 text-[10px]"></i>
          </span>
          All Songs
        </h3>
        <span class="badge text-[11px] font-semibold px-2.5 py-1 rounded-full">46 tracks</span>
      </div>
      <div class="flex gap-3.5 overflow-x-auto pb-3 snap-x scroll-smooth" id="allSongs" style="-webkit-overflow-scrolling: touch;"></div>
    </div>
  </main>

  <!-- ═══════════════════════════════════════════
       NOW PLAYING BAR
  ══════════════════════════════════════════════ -->
  <div class="fixed bottom-0 left-0 right-0 z-50 player-glass rounded-t-3xl safe-bottom">
    <!-- Drag handle pill -->
    <div class="flex justify-center pt-2.5 pb-1">
      <div class="w-9 h-1 bg-white/15 rounded-full"></div>
    </div>

    <!-- Player row -->
    <div class="flex items-center gap-3 px-4 pb-1">
      <!-- Cover -->
      <div class="relative flex-shrink-0">
        <img id="playerCover" src="https://picsum.photos/id/29/300/300"
          class="w-[52px] h-[52px] rounded-[14px] object-cover cover-ring" alt="Now playing">
        <div class="live-dot absolute -bottom-1 -right-1"></div>
      </div>

      <!-- Info -->
      <div class="flex-1 min-w-0">
        <p id="playerTitle" class="font-semibold text-[15px] truncate tracking-tight leading-tight">Select a song</p>
        <p id="playerArtist" class="text-xs text-zinc-400 truncate mt-0.5 flex items-center gap-1.5">
          <i class="fas fa-microphone-alt text-[9px] text-emerald-500"></i>
          <span>Artist</span>
        </p>
      </div>

      <!-- Controls -->
      <div class="flex items-center gap-2 flex-shrink-0">
        <button onclick="prevSong()" class="ctrl-btn w-9 h-9 flex items-center justify-center rounded-full text-zinc-300">
          <i class="fas fa-backward-step text-[15px]"></i>
        </button>
        <button onclick="togglePlay()" id="playBtn"
          class="play-btn w-12 h-12 flex items-center justify-center text-black rounded-full">
          <i class="fas fa-play text-base ml-0.5"></i>
        </button>
        <button onclick="nextSong()" class="ctrl-btn w-9 h-9 flex items-center justify-center rounded-full text-zinc-300">
          <i class="fas fa-forward-step text-[15px]"></i>
        </button>
      </div>
    </div>

    <audio id="audioPlayer" preload="metadata"></audio>

    <!-- Progress -->
    <div class="px-4 pb-1 mt-2 flex items-center gap-2.5 text-[11px] font-mono text-zinc-500">
      <span id="currentTime" class="w-8 text-right tabular-nums">0:00</span>
      <div class="flex-1 h-1 progress-track cursor-pointer" onclick="seek(event)">
        <div id="progressBar" class="h-full w-0 rounded-full"
          style="background: linear-gradient(90deg, #34d399, #10b981);"></div>
      </div>
      <span id="duration" class="w-8 tabular-nums">0:00</span>
    </div>

    <!-- Mini meta row -->
    <div class="flex justify-center items-center gap-5 px-4 pb-1 mt-0.5 text-[11px] text-zinc-600">
      <span class="flex items-center gap-1.5">
        <i class="far fa-heart text-emerald-500/60 text-[10px]"></i> likes
      </span>
      <span class="flex items-center gap-1.5">
        <i class="fas fa-waveform text-[10px]"></i> now playing
      </span>
      <span class="flex items-center gap-1.5">
        <i class="fas fa-shuffle text-[10px]"></i> shuffle
      </span>
    </div>
  </div>

      { title: "Tingin", artist: "Cup of Joe & Janine", file: "Tingin%20by%20Cup%20of%20Joe%20and%20Janine%20Te%C3%B1oso%20(Lyrics).mp3" },
      { title: "Wakas", artist: "Sunkissed Lola", file: "Wakas.mp3" },
      { title: "Habang Buhay", artist: "Zack Tabudlo", file: "Zack%20Tabudlo%20-%20Habang%20Buhay%20(Lyric%20Video).mp3" },
      { title: "Kalapastangan", artist: "fitterkarma", file: "fitterkarma%20-%20Kalapastangan%20(Lyrics).mp3" },
      { title: "Paano na, Sinta", artist: "iluna, Frank Ely", file: "iluna%2C%20Frank%20Ely%20-%20Paano%20na%2C%20Sinta_%20(Lyric%20Video).mp3" },
    ];

    const getCoverArt = (seed) => `https://picsum.photos/id/${(seed % 150) + 10}/300/300`;

    let currentSongIndex = 0;
    let isPlaying = false;
    const audio = document.getElementById('audioPlayer');

    const quickPickSongs = [
      { title: "Sining", artist: "Dionela ft. Jay R", index: 12 },
      { title: "Palagi", artist: "TJ Monterde", index: 31 },
      { title: "Uhaw", artist: "Dilaw", index: 0 },
      { title: "Raining in Manila", artist: "Lola Amour", index: 24 }
    ];

    function renderQuickPicks() {
      const container = document.getElementById('quickPicks');
      container.innerHTML = quickPickSongs.map((pick, i) => {
        const song = songs[pick.index];
        const gradients = [
          'from-emerald-900/40 to-teal-900/20',
          'from-green-900/40 to-emerald-900/20',
          'from-teal-900/40 to-cyan-900/20',
          'from-green-800/30 to-teal-900/20',
        ];
        return `
          <div onclick="playSong(${pick.index})" class="quick-pick-card p-3 flex items-center gap-3 cursor-pointer">
            <div class="w-11 h-11 rounded-xl bg-gradient-to-br ${gradients[i]} flex items-center justify-center flex-shrink-0 border border-white/05">
              <i class="fas fa-play text-emerald-400 text-[11px] ml-0.5"></i>
            </div>
            <div class="flex-1 min-w-0">
              <p class="font-semibold text-[13px] truncate leading-tight">${song.title}</p>
              <p class="text-[11px] text-emerald-300/60 truncate mt-0.5">${song.artist}</p>
            </div>
            <i class="fas fa-chevron-right text-[10px] text-zinc-600 flex-shrink-0"></i>
          </div>
        `;
      }).join('');
    }

    function renderAllSongs() {
      const container = document.getElementById('allSongs');
      container.innerHTML = songs.map((song, idx) => `
        <div onclick="playSong(${idx})" class="snap-start flex-shrink-0 w-[148px] cursor-pointer song-card">
          <div class="album-wrapper">
            <img src="${getCoverArt(idx)}" class="w-[148px] h-[148px] object-cover" alt="${song.title}">
          </div>
          <div class="mt-2.5 px-0.5">
            <p class="font-semibold text-[13px] leading-tight line-clamp-2">${song.title}</p>
            <p class="text-[11px] text-zinc-500 mt-1 flex items-center gap-1 truncate">
              <i class="fas fa-user text-[8px] text-emerald-600/70"></i> ${song.artist}
            </p>
          </div>
        </div>
      `).join('');
    }

    function updatePlayerUI() {
      const song = songs[currentSongIndex];
      document.getElementById('playerTitle').textContent = song.title;
      document.getElementById('playerArtist').innerHTML =
        `<i class="fas fa-microphone-alt text-[9px] text-emerald-500"></i><span>${song.artist}</span>`;
      document.getElementById('playerCover').src = getCoverArt(currentSongIndex);
      const icon = document.querySelector('#playBtn i');
      if (icon) icon.className = isPlaying ? 'fas fa-pause text-base' : 'fas fa-play text-base ml-0.5';
      // glow ring
      const cover = document.getElementById('playerCover');
      if (isPlaying) cover.classList.add('playing');
      else cover.classList.remove('playing');
    }

    function playSong(index) {
      if (index === currentSongIndex && audio.src && !audio.paused) return;
      currentSongIndex = index;
      audio.src = baseURL + songs[index].file;
      audio.load();
      audio.play().then(() => { isPlaying = true; updatePlayerUI(); })
        .catch(err => { console.warn("Playback error:", err); isPlaying = false; updatePlayerUI(); });
    }

    function togglePlay() {
      if (!audio.src) { playSong(0); return; }
      if (isPlaying) { audio.pause(); isPlaying = false; }
      else { audio.play().catch(() => playSong(currentSongIndex)); isPlaying = true; }
      updatePlayerUI();
    }

    function nextSong() { currentSongIndex = (currentSongIndex + 1) % songs.length; playSong(currentSongIndex); }
    function prevSong() { currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length; playSong(currentSongIndex); }

    audio.addEventListener('timeupdate', () => {
      if (audio.duration && !isNaN(audio.duration)) {
        const pct = (audio.currentTime / audio.duration) * 100;
        document.getElementById('progressBar').style.width = `${pct}%`;
        document.getElementById('currentTime').textContent = fmt(audio.currentTime);
        document.getElementById('duration').textContent = fmt(audio.duration);
      }
    });
    audio.addEventListener('loadedmetadata', () => { document.getElementById('duration').textContent = fmt(audio.duration); });
    audio.addEventListener('ended', nextSong);
    audio.addEventListener('play', () => { isPlaying = true; updatePlayerUI(); });
    audio.addEventListener('pause', () => { isPlaying = false; updatePlayerUI(); });

    function seek(e) {
      if (!audio.duration) return;
      const rect = e.currentTarget.getBoundingClientRect();
      const pct = Math.max(0, Math.min(1, (e.clientX - rect.left) / rect.width));
      audio.currentTime = pct * audio.duration;
    }

    function fmt(s) {
      if (isNaN(s)) return "0:00";
      const m = Math.floor(s / 60), sec = Math.floor(s % 60);
      return `${m}:${sec < 10 ? '0' : ''}${sec}`;
    }

    renderQuickPicks();
    renderAllSongs();

    window.playSong = playSong;
    window.togglePlay = togglePlay;
    window.nextSong = nextSong;
    window.prevSong = prevSong;
    window.seek = seek;

    document.body.addEventListener('touchstart', () => {}, { passive: true });
    console.log("OPM 2025 — glassmorphism edition loaded");
  </script>
</body>
</html>
