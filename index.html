<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <title>OPM 2025 — Mood & Vibes</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
  <style>
    * {
      -webkit-tap-highlight-color: transparent;
    }

    body {
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, Helvetica, sans-serif;
      background: #0a0a0a;
    }

    /* smooth custom scroll for horizontal & vertical */
    .overflow-x-auto::-webkit-scrollbar {
      height: 4px;
    }
    .overflow-x-auto::-webkit-scrollbar-track {
      background: #1f1f1f;
      border-radius: 10px;
    }
    .overflow-x-auto::-webkit-scrollbar-thumb {
      background: #3b3b3b;
      border-radius: 10px;
    }
    
    /* now playing glassmorphism layer */
    .player-glass {
      background: rgba(18, 18, 18, 0.96);
      backdrop-filter: blur(12px);
      border-top: 1px solid rgba(255, 255, 255, 0.08);
      box-shadow: 0 -8px 25px rgba(0, 0, 0, 0.5);
    }
    
    /* card hover & press animation */
    .song-card {
      transition: transform 0.2s cubic-bezier(0.2, 0.9, 0.4, 1.1), opacity 0.2s;
    }
    .song-card:active {
      transform: scale(0.96);
    }
    
    /* playlist quick pick shimmer effect */
    .quick-pick-card {
      background: linear-gradient(135deg, #1f2a1f 0%, #111811 100%);
      transition: all 0.2s ease;
    }
    .quick-pick-card:active {
      transform: scale(0.97);
      background: #2a342a;
    }
    
    /* animated progress knob */
    #progressBar {
      transition: width 0.05s linear;
    }
    
    /* loading / pulse effect */
    @keyframes pulseGlow {
      0% { opacity: 0.6; }
      100% { opacity: 1; }
    }
    .album-art {
      background: #222;
      box-shadow: 0 12px 20px -8px rgba(0,0,0,0.5);
    }
    
    /* hide default audio controls */
    audio {
      display: none;
    }

    /* ripple effect for play button */
    .play-ripple {
      transition: all 0.15s ease;
    }
    .play-ripple:active {
      transform: scale(0.92);
    }
    
    /* truncate lines for song titles */
    .line-clamp-2 {
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    /* custom progress container */
    .progress-container {
      background: #2c2c2e;
    }
  </style>
</head>
<body class="bg-black text-white min-h-screen pb-28 selection:bg-green-600/30">

    <audio id="audioPlayer" preload="metadata"></audio>

      <div class="flex-1 h-1.5 bg-zinc-800 rounded-full overflow-hidden cursor-pointer progress-container" onclick="seek(event)">
        <div id="progressBar" class="h-full w-0 bg-gradient-to-r from-green-400 to-emerald-500 rounded-full relative"></div>
      </div>
      <span id="duration" class="w-8">0:00</span>
    </div>
    
    <!-- mini player extra vibe -->
    <div class="flex justify-center gap-4 mt-1.5 text-[11px] text-zinc-500">

      <span><i class="fas fa-waveform mr-1"></i> now playing</span>
    </div>
  </div>

  <script>
    // ======================== ENHANCED MOBILE AUDIO PLAYER ==========================

      { title: "Pagsamo", artist: "Arthur Nery", file: "Pagsamo%20-%20Arthur%20Nery%20(Official%20Lyric%20Visualizer).mp3" },
      { title: "Pahina", artist: "Cup of Joe", file: "Pahina%20-%20Cup%20of%20Joe%20(Official%20Audio).mp3" },
      { title: "Panaginip", artist: "nicole", file: "Panaginip%20-%20nicole%20(Lyrics).mp3" },

      { title: "DUNGKA!", artist: "SB19", file: "SB19%20'DUNGKA!'%20Lyric%20Video.mp3" },

      { title: "Kalimutan Ka", artist: "Skusta Clee", file: "Skusta%20Clee%20-%20Kalimutan%20Ka%20(Official%20Music%20Video).mp3" },
      { title: "Tahanan (Live)", artist: "El Manu", file: "Tahanan%20(Live%20at%20The%20Cozy%20Cove)%20-%20El%20Manu%2C%20Jessy%20Kang%2C%20Jason%20Marvin.mp3" },
      { title: "Tibok", artist: "Earl Agustin", file: "Tibok%20-%20Earl%20Agustin%20(Official%20Music%20Video).mp3" },
      { title: "Tingin", artist: "Cup of Joe & Janine", file: "Tingin%20by%20Cup%20of%20Joe%20and%20Janine%20Te%C3%B1oso%20(Lyrics).mp3" },
      { title: "Wakas", artist: "Sunkissed Lola", file: "Wakas.mp3" },
      { title: "Habang Buhay", artist: "Zack Tabudlo", file: "Zack%20Tabudlo%20-%20Habang%20Buhay%20(Lyric%20Video).mp3" },
      { title: "Kalapastangan", artist: "fitterkarma", file: "fitterkarma%20-%20Kalapastangan%20(Lyrics).mp3" },
      { title: "Paano na, Sinta", artist: "iluna, Frank Ely", file: "iluna%2C%20Frank%20Ely%20-%20Paano%20na%2C%20Sinta_%20(Lyric%20Video).mp3" },
    ];
    
    // Helper: get consistent random but nice cover arts using unsplash gradient style
    const getCoverArt = (seed) => `https://picsum.photos/id/${(seed % 150) + 10}/300/300`;

    let currentSongIndex = 0;
    let isPlaying = false;
    const audio = document.getElementById('audioPlayer');
    const playBtnIcon = document.querySelector('#playBtn i');
    
    // Quick picks curated from trending OPM (enhanced)
    const quickPickSongs = [
      { title: "Sining", artist: "Dionela ft. Jay R", index: 12 },
      { title: "Palagi", artist: "TJ Monterde", index: 31 },
      { title: "Uhaw", artist: "Dilaw", index: 0 },
      { title: "Raining in Manila", artist: "Lola Amour", index: 24 }
    ];
    
    function renderQuickPicks() {
      const container = document.getElementById('quickPicks');
      container.innerHTML = quickPickSongs.map(pick => {
        const song = songs[pick.index];
        return `
          <div onclick="playSong(${pick.index})" class="quick-pick-card rounded-2xl p-3 flex items-center gap-3 shadow-md active:scale-[0.98] transition-all cursor-pointer">
            <div class="w-12 h-12 rounded-xl bg-gradient-to-br from-green-800/40 to-emerald-900/30 flex items-center justify-center overflow-hidden shadow-inner">
              <i class="fas fa-play text-green-400 text-xs"></i>
            </div>
            <div class="flex-1 min-w-0">
              <p class="font-semibold text-sm truncate">${song.title}</p>
              <p class="text-[11px] text-green-300/70 truncate">${song.artist}</p>
            </div>
            <i class="fas fa-music text-[10px] text-zinc-500"></i>
          </div>
        `;
      }).join('');
    }
    
    function renderAllSongs() {
      const container = document.getElementById('allSongs');
      container.innerHTML = songs.map((song, idx) => `
        <div onclick="playSong(${idx})" class="snap-start flex-shrink-0 w-40 cursor-pointer song-card transition-transform active:scale-95">
          <div class="relative overflow-hidden rounded-xl shadow-2xl">
            <img src="${getCoverArt(idx)}" class="w-40 h-40 object-cover rounded-xl album-art" alt="album art">
            <div class="absolute inset-0 bg-black/20 rounded-xl opacity-0 hover:opacity-100 transition group-hover:bg-black/30"></div>
          </div>
          <div class="mt-2.5">
            <p class="font-semibold text-sm leading-tight line-clamp-2">${song.title}</p>
            <p class="text-xs text-zinc-400 mt-0.5 flex items-center gap-1"><i class="fas fa-user-alt text-[8px] text-green-600"></i> ${song.artist}</p>
          </div>
        </div>
      `).join('');
    }
    
    function updatePlayerUI() {
      const song = songs[currentSongIndex];
      document.getElementById('playerTitle').textContent = song.title;
      document.getElementById('playerArtist').innerHTML = `<i class="fas fa-microphone-alt text-[9px] text-green-600"></i> ${song.artist}`;
      document.getElementById('playerCover').src = getCoverArt(currentSongIndex);
      const playButtonIcon = document.querySelector('#playBtn i');
      if (playButtonIcon) {
        playButtonIcon.className = isPlaying ? 'fas fa-pause text-lg' : 'fas fa-play text-lg ml-0.5';
      }
    }
    
    function playSong(index) {
      if (index === currentSongIndex && audio.src && !audio.paused) {
        // same song playing, just keep
        return;
      }
      currentSongIndex = index;
      const song = songs[index];
      const encodedFile = song.file;
      audio.src = baseURL + encodedFile;
      audio.load();
      audio.play().then(() => {
        isPlaying = true;
        updatePlayerUI();
      }).catch(err => {
        console.warn("Playback error:", err);
        isPlaying = false;
        updatePlayerUI();
        // Fallback: if network error, show simple alert
        alert("Unable to play track. Check connection or file link.");
      });
    }
    
    function togglePlay() {
      if (!audio.src) {
        playSong(0);
        return;
      }
      if (isPlaying) {
        audio.pause();
        isPlaying = false;
      } else {
        audio.play().catch(e => {
          console.log(e);
          playSong(currentSongIndex);
        });
        isPlaying = true;
      }
      updatePlayerUI();
    }
    
    function nextSong() {
      currentSongIndex = (currentSongIndex + 1) % songs.length;
      playSong(currentSongIndex);
    }
    
    function prevSong() {
      currentSongIndex = (currentSongIndex - 1 + songs.length) % songs.length;
      playSong(currentSongIndex);
    }
    
    audio.addEventListener('timeupdate', () => {
      if (audio.duration && !isNaN(audio.duration)) {
        const percent = (audio.currentTime / audio.duration) * 100;
        document.getElementById('progressBar').style.width = `${percent}%`;
        document.getElementById('currentTime').textContent = formatTime(audio.currentTime);
        document.getElementById('duration').textContent = formatTime(audio.duration);
      }
    });
    
    audio.addEventListener('loadedmetadata', () => {
      document.getElementById('duration').textContent = formatTime(audio.duration);
    });
    
    audio.addEventListener('ended', () => {
      nextSong();
    });
    
    audio.addEventListener('play', () => {
      isPlaying = true;
      updatePlayerUI();
    });
    
    audio.addEventListener('pause', () => {
      isPlaying = false;
      updatePlayerUI();
    });
    
    function seek(e) {
      if (!audio.duration) return;
      const rect = e.currentTarget.getBoundingClientRect();
      let clickX = e.clientX - rect.left;
      if (clickX < 0) clickX = 0;
      if (clickX > rect.width) clickX = rect.width;
      const percent = clickX / rect.width;
      audio.currentTime = percent * audio.duration;
    }
    
    function formatTime(seconds) {
      if (isNaN(seconds)) return "0:00";
      const mins = Math.floor(seconds / 60);
      const secs = Math.floor(seconds % 60);
      return `${mins}:${secs < 10 ? '0' : ''}${secs}`;
    }
    
    // initial load: default state
    renderQuickPicks();
    renderAllSongs();
    
    // Set default cover nicely
    document.getElementById('playerCover').src = "https://picsum.photos/id/29/300/300";
    
    // optional: if audio errors on first interaction, fix accordingly
    window.playSong = playSong;
    window.togglePlay = togglePlay;
    window.nextSong = nextSong;
    window.prevSong = prevSong;
    window.seek = seek;
    
    // small extra: apply body listener for mobile volume fix (just safe)
    document.body.addEventListener('touchstart', () => {}, { passive: true });
    
    // for user experience, inform that clicking song starts playback
    console.log("OPM 2025 — mobile ready");
  </script>
</body>
</html>
